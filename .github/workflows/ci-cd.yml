name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore backend/TreeDrive.Backend.slnx  
    
    - name: Build
      run: dotnet build backend/TreeDrive.Backend.slnx --no-restore 
    
    - name: Run Unit Tests
      run: dotnet test backend/TreeDrive.Backend.slnx --no-build --verbosity normal  

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/TreeDrive.Frontend/package-lock.json
    
    - name: Install dependencies
      run: |
        cd frontend/TreeDrive.Frontend
        npm ci
    
    - name: Build
      run: |
        cd frontend/TreeDrive.Frontend
        npm run build