services:
  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: treedrive-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - treedrive-network

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: backend/services/auth-service/Dockerfile
    container_name: treedrive-auth
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - Jwt__Secret=SuperSecretKey123!@#$%^&*()ABCDEFGHIJKLMNOPQRSTUVWXYZ123456
    depends_on:
      - mongodb
    networks:
      - treedrive-network

  # File Service
  file-service:
    build:
      context: .
      dockerfile: backend/services/file-service/Dockerfile
    container_name: treedrive-file
    ports:
      - "5002:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - Jwt__Secret=SuperSecretKey123!@#$%^&*()ABCDEFGHIJKLMNOPQRSTUVWXYZ123456
      - FileStorage__Path=/app/server_files
    depends_on:
      - mongodb
    networks:
      - treedrive-network
    volumes:
      - file_storage:/app/server_files

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: backend/services/api-gateway/Dockerfile
    container_name: treedrive-gateway
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Services__AuthService=http://auth-service:80
      - Services__FileService=http://file-service:80
    depends_on:
      - auth-service
      - file-service
    networks:
      - treedrive-network

  # ✅ Frontend (React)
  frontend:
    build:
      context: ./frontend/TreeDrive.Frontend
      dockerfile: Dockerfile
    container_name: treedrive-frontend
    ports:
      - "5173:80"
    volumes:
      - ./frontend/TreeDrive.Frontend:/app  # Mount code
      - /app/node_modules                     # Exclude node_modules
    depends_on:
      - api-gateway
    networks:
      - treedrive-network
    environment:
      - VITE_API_URL=http://api-gateway:80

networks:
  treedrive-network:
    driver: bridge

volumes:
  mongodb_data:
  file_storage: